<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>แดชบอร์ดคัดกรองสุขภาพช่องปากนักเรียน</title>
<style>
:root{
  color-scheme: light;
  --text-primary:#0e1726; --text-secondary:#475569; --muted:#8a93a3;
  --card:#ffffffee; --card-border:rgba(255,255,255,0.65);
  --track:#eef2f8; --baseline:#dbe3ee;
  --series-1:#2563eb;
  --good:#16a34a; --warning:#f59e0b; --serious:#f97316; --critical:#e11d48;
  --shadow:0 10px 30px -12px rgba(15,23,42,0.25), 0 2px 8px -4px rgba(15,23,42,0.12);
  --side:#ffffffe6; --side-border:rgba(15,23,42,0.07); --side-ink:#475569; --side-active:#2563eb;
  --bg1:#eef4ff; --bg2:#eafcf6; --bg3:#fef3f7;
  --blob-a:#4f8cff55; --blob-b:#22c9a955; --blob-c:#f871a055; --blob-d:#f7c04a55;
}
:root[data-theme="dark"]{
  color-scheme: dark;
  --text-primary:#f1f5f9; --text-secondary:#c3ccd9; --muted:#8593a6;
  --card:#141b2bcc; --card-border:rgba(255,255,255,0.08);
  --track:#1d2637; --baseline:#2b3648;
  --series-1:#4f8cff;
  --good:#22c55e; --warning:#fbbf24; --serious:#fb923c; --critical:#fb5478;
  --shadow:0 14px 34px -16px rgba(0,0,0,0.7), 0 2px 10px -6px rgba(0,0,0,0.6);
  --side:#111827e6; --side-border:rgba(255,255,255,0.08); --side-ink:#c3ccd9; --side-active:#4f8cff;
  --bg1:#0b1220; --bg2:#0a1a1a; --bg3:#180f18;
  --blob-a:#3b6fe055; --blob-b:#0e8f7555; --blob-c:#a13a6a55; --blob-d:#9a7a2255;
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  min-height:100vh; color:var(--text-primary);
  font-family:"Segoe UI", system-ui, -apple-system, "Sarabun", sans-serif; font-size:15px; line-height:1.45;
  background:
    radial-gradient(60% 55% at 12% 6%, var(--blob-a), transparent 60%),
    radial-gradient(55% 50% at 92% 10%, var(--blob-b), transparent 60%),
    radial-gradient(60% 55% at 85% 92%, var(--blob-c), transparent 60%),
    radial-gradient(50% 50% at 10% 95%, var(--blob-d), transparent 60%),
    linear-gradient(135deg, var(--bg1), var(--bg2) 55%, var(--bg3));
  background-attachment:fixed;
}
.app{display:flex; align-items:flex-start}

/* SIDEBAR */
.sidebar{width:238px; flex:none; position:sticky; top:0; height:100vh; display:flex; flex-direction:column;
  background:var(--side); border-right:1px solid var(--side-border); backdrop-filter:blur(14px); padding:18px 14px; z-index:30}
.side-brand{display:flex; align-items:center; gap:11px; padding:4px 6px 14px; border-bottom:1px solid var(--side-border); margin-bottom:12px}
.side-brand img{width:46px; height:46px; border-radius:13px; flex:none; box-shadow:0 8px 18px -8px rgba(37,99,235,.5); background:#fff}
.side-brand .bt{font-size:15px; font-weight:800; line-height:1.15}
.side-brand .bs{font-size:10.5px; color:var(--muted); font-weight:600}
.side-menu{display:flex; flex-direction:column; gap:4px; overflow-y:auto; flex:1; margin:0 -4px; padding:0 4px}
.side-menu button{display:flex; align-items:center; gap:11px; width:100%; text-align:left; background:none; border:none;
  color:var(--side-ink); border-radius:12px; padding:11px 12px; cursor:pointer; font-size:13.5px; font-family:inherit; font-weight:600}
.side-menu button .mi{width:30px; height:30px; border-radius:9px; display:grid; place-items:center; font-size:16px; flex:none; color:#fff}
.side-menu button:hover{background:var(--track); color:var(--text-primary)}
.side-menu button.active{background:linear-gradient(90deg,var(--side-active),transparent 130%); color:#fff}
.side-menu button.active .mi{box-shadow:0 0 0 2px rgba(255,255,255,.35)}
.side-foot{border-top:1px solid var(--side-border); padding-top:12px; margin-top:8px}
.side-foot button{width:100%; background:var(--track); border:1px solid var(--side-border); color:var(--side-ink);
  border-radius:11px; padding:10px; cursor:pointer; font-size:12.5px; font-family:inherit; font-weight:600}

/* MAIN */
.main{flex:1; min-width:0; padding:22px 24px 80px}
.topbar{display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; margin-bottom:14px}
.topbar h1{font-size:21px; margin:0; letter-spacing:-.01em}
.topbar .sub{color:var(--text-secondary); font-size:12.5px; margin:1px 0 0}
.nsel{color:var(--text-secondary); font-size:13px; font-weight:700; white-space:nowrap; background:var(--card);
  border:1px solid var(--card-border); border-radius:11px; padding:9px 13px; box-shadow:var(--shadow)}

.filters{display:flex; gap:14px; flex-wrap:wrap; align-items:flex-end;
  background:var(--card); border:1px solid var(--card-border); border-radius:18px;
  padding:14px 16px; margin-bottom:18px; box-shadow:var(--shadow); backdrop-filter:blur(10px)}
.filt label{display:flex; align-items:center; gap:5px; font-size:11px; letter-spacing:.02em; text-transform:uppercase;
  color:var(--muted); margin-bottom:6px; font-weight:700}
.filt select{background:var(--track); color:var(--text-primary); border:1px solid var(--card-border);
  border-radius:11px; padding:9px 12px; font-size:14px; min-width:130px; font-family:inherit; cursor:pointer}
.filt select:focus{outline:2px solid var(--series-1); outline-offset:0}
.reset{margin-left:auto; align-self:center}
.reset button{background:linear-gradient(135deg,#2563eb,#4f8cff); border:none; color:#fff;
  border-radius:11px; padding:10px 16px; cursor:pointer; font-size:13px; font-weight:600; box-shadow:0 8px 18px -8px #2563ebcc}
.reset button:hover{filter:brightness(1.05)}

.kpis{display:grid; grid-template-columns:repeat(auto-fit,minmax(168px,1fr)); gap:14px; margin-bottom:6px}
.kpi{position:relative; overflow:hidden; border-radius:18px; padding:16px 17px; color:#fff; box-shadow:var(--shadow); isolation:isolate}
.kpi::after{content:""; position:absolute; right:-18px; top:-18px; width:92px; height:92px; border-radius:50%; background:rgba(255,255,255,.18); z-index:-1}
.kpi .k-ic{font-size:22px; margin-bottom:6px; filter:drop-shadow(0 2px 4px rgba(0,0,0,.2))}
.kpi .k-val{font-size:28px; font-weight:800; letter-spacing:-.02em; line-height:1.05}
.kpi .k-lab{font-size:13px; font-weight:600; margin-top:3px; opacity:.96}
.kpi .k-sub{font-size:11.5px; margin-top:3px; opacity:.85}
.g-blue{background:linear-gradient(135deg,#2563eb,#4f8cff)}
.g-teal{background:linear-gradient(135deg,#0ea5a4,#22c9a9)}
.g-green{background:linear-gradient(135deg,#16a34a,#4ade80)}
.g-amber{background:linear-gradient(135deg,#f59e0b,#fbbf24)}
.g-red{background:linear-gradient(135deg,#e11d48,#fb7185)}
.g-purple{background:linear-gradient(135deg,#7c3aed,#a78bfa)}
.kpi.kpi-risk{background:var(--card); border:1px solid var(--card-border); color:var(--text-primary); grid-column:span 2; backdrop-filter:blur(10px); display:flex; flex-direction:column; justify-content:center}
.kpi.kpi-risk::after{display:none}
.kpi-risk .k-ic{filter:none; margin-bottom:4px}
.kpi-risk .rk-t{font-size:13px; font-weight:700; margin-bottom:9px}
.riskbar{display:flex; height:18px; border-radius:9px; overflow:hidden; gap:2px; background:var(--track); margin-bottom:11px}
.riskbar .seg{min-width:3px; transition:width .55s cubic-bezier(.22,.61,.36,1)}
.risklg{display:flex; flex-wrap:wrap; gap:8px 16px}
.risklg .rl{font-size:12px; color:var(--text-secondary); display:flex; align-items:center; gap:6px; font-weight:600}
.risklg .rl i{width:11px; height:11px; border-radius:3px; display:inline-block}
.risklg .rl b{color:var(--text-primary); font-variant-numeric:tabular-nums}

section.cat{margin-top:26px; scroll-margin-top:14px}
.cat-h{display:flex; align-items:center; gap:12px; margin:0 0 4px}
.cat-badge{width:42px; height:42px; border-radius:13px; display:grid; place-items:center; font-size:22px; flex:none; color:#fff; box-shadow:0 8px 18px -8px rgba(15,23,42,.4)}
.cat-h h2{font-size:18px; margin:0}
.cat-h .cat-n{font-size:12px; color:var(--muted); font-weight:600}
.cat-desc{color:var(--text-secondary); font-size:13px; margin:2px 0 14px 54px}
.insights{background:linear-gradient(135deg, rgba(37,99,235,.07), rgba(34,201,169,.06)); border:1px solid var(--card-border);
  border-left:4px solid var(--series-1); border-radius:14px; padding:13px 17px; margin:0 0 16px; box-shadow:var(--shadow); backdrop-filter:blur(8px)}
.insights h4{margin:0 0 9px; font-size:14px; display:flex; align-items:center; gap:7px}
.insights ul{margin:0; padding:0; list-style:none; display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:7px 20px}
.insights li{font-size:13px; color:var(--text-secondary); display:flex; gap:8px; align-items:flex-start; line-height:1.5}
.insights li .d{flex:none; font-size:11px; margin-top:2px}
.insights b{color:var(--text-primary); font-weight:700}

.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:16px}
.card{background:var(--card); border:1px solid var(--card-border); border-radius:18px; padding:16px 17px 15px; box-shadow:var(--shadow); backdrop-filter:blur(10px); position:relative}
.card.wide{grid-column:1/-1}
.card h3{font-size:14.5px; margin:0 0 2px; display:flex; align-items:center; gap:7px}
.card h3 .ci{font-size:16px}
.card .h-sub{font-size:12px; color:var(--muted); margin:0 0 14px}
.card .note{font-size:11.5px; color:var(--muted); margin-top:12px; border-top:1px dashed var(--baseline); padding-top:8px}

.vbars{display:flex; align-items:stretch; gap:10px; height:210px; overflow-x:auto; padding-bottom:2px}
.vbars.many{gap:7px}
.vcol{flex:1 1 0; min-width:40px; display:flex; flex-direction:column; align-items:center}
.vval{height:32px; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; line-height:1.05}
.vval .vc{font-size:13px; font-weight:800; font-variant-numeric:tabular-nums}
.vval .vp{font-size:10px; color:var(--muted); font-weight:600}
.vwrap{flex:1; width:100%; display:flex; align-items:flex-end; justify-content:center}
.vbar{width:100%; max-width:52px; border-radius:9px 9px 4px 4px; min-height:4px; transition:height .55s cubic-bezier(.22,.61,.36,1); box-shadow:inset 0 -2px 6px rgba(0,0,0,.08)}
.vlab{height:52px; padding-top:7px; font-size:10.5px; line-height:1.18; text-align:center; color:var(--text-secondary); overflow:hidden; display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; word-break:break-word; width:100%}
.vlab .fl{color:var(--critical); font-weight:700}

.legend{display:flex; gap:14px; flex-wrap:wrap; margin-top:14px}
.legend span{font-size:11.5px; color:var(--text-secondary); display:inline-flex; align-items:center; gap:6px; font-weight:600}
.legend i{width:11px; height:11px; border-radius:4px; display:inline-block}

.empty{color:var(--muted); font-size:13px; padding:26px 0; text-align:center}
.vcol{cursor:pointer}
.vcol:hover .vbar{filter:brightness(1.08) saturate(1.1); box-shadow:inset 0 -2px 6px rgba(0,0,0,.08), 0 0 0 2px rgba(37,99,235,.25)}
.card h3{justify-content:space-between}
.card h3 .htxt{display:flex; align-items:center; gap:7px; min-width:0}
.card-view{flex:none; background:var(--track); border:1px solid var(--card-border); color:var(--series-1);
  border-radius:9px; padding:4px 9px; font-size:11.5px; font-weight:700; cursor:pointer; font-family:inherit; white-space:nowrap}
.card-view:hover{background:var(--series-1); color:#fff}

/* MODAL table */
.modal-overlay{position:fixed; inset:0; background:rgba(8,12,22,.55); backdrop-filter:blur(3px); z-index:60;
  display:none; align-items:center; justify-content:center; padding:24px}
.modal-overlay.open{display:flex}
.modal{background:var(--card); border:1px solid var(--card-border); border-radius:18px; box-shadow:0 30px 70px -20px rgba(0,0,0,.6);
  width:min(1040px,100%); max-height:88vh; display:flex; flex-direction:column; backdrop-filter:blur(14px)}
.modal-head{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:16px 18px 12px; border-bottom:1px solid var(--card-border)}
.modal-head h3{margin:0; font-size:16px; display:flex; align-items:center; gap:8px}
.modal-head .m-sub{font-size:12px; color:var(--muted); font-weight:600; margin-top:2px}
.modal-actions{display:flex; gap:8px; flex:none}
.btn-csv{background:linear-gradient(135deg,#16a34a,#22c55e); border:none; color:#fff; border-radius:10px; padding:9px 14px; cursor:pointer; font-size:13px; font-weight:700; font-family:inherit}
.btn-csv:hover{filter:brightness(1.05)}
.btn-x{background:var(--track); border:1px solid var(--card-border); color:var(--text-secondary); border-radius:10px; width:38px; cursor:pointer; font-size:16px; font-family:inherit}
.btn-x:hover{color:var(--text-primary)}
.modal-body{overflow:auto; padding:6px 4px 4px}
table.rec{border-collapse:collapse; width:100%; font-size:12.5px}
table.rec th,table.rec td{padding:8px 12px; text-align:left; white-space:nowrap; border-bottom:1px solid var(--baseline)}
table.rec th{position:sticky; top:0; background:var(--card); color:var(--text-secondary); font-weight:700; font-size:11.5px; z-index:1}
table.rec td{color:var(--text-primary)}
table.rec td.numc{font-variant-numeric:tabular-nums; text-align:right}
table.rec tbody tr:hover td, table.rec tr:hover td{background:var(--track)}
.modal-foot{padding:8px 18px 14px; font-size:11.5px; color:var(--muted)}
.tip{position:fixed; pointer-events:none; z-index:50; background:#0e1726; color:#fff; padding:7px 10px; border-radius:9px; font-size:12px; opacity:0; transition:opacity .12s; max-width:260px; box-shadow:0 10px 24px -8px rgba(0,0,0,.5)}
footer{margin-top:36px; color:var(--muted); font-size:12px; background:var(--card); border:1px solid var(--card-border); border-radius:16px; padding:14px 18px; box-shadow:var(--shadow); backdrop-filter:blur(8px)}
::-webkit-scrollbar{height:8px; width:8px}
::-webkit-scrollbar-thumb{background:var(--baseline); border-radius:8px}
#updatebar{display:none; background:linear-gradient(135deg,#2563eb,#4f8cff); color:#fff; font-size:13px; font-weight:600;
  padding:9px 16px; text-align:center}
#updatebar a{color:#fff; font-weight:800; text-decoration:underline; margin:0 4px}
#updatebar .x{cursor:pointer; margin-left:10px; opacity:.85}
#updatebar .x:hover{opacity:1}

@media (max-width:900px){
  .app{flex-direction:column}
  .sidebar{width:100%; height:auto; position:sticky; top:0; flex-direction:row; align-items:center; gap:12px; padding:10px 12px; overflow-x:auto; border-right:none; border-bottom:1px solid var(--side-border)}
  .side-brand{border-bottom:none; margin:0; padding:0 8px 0 2px; flex:none}
  .side-brand .bt,.side-brand .bs{display:none}
  .side-menu{flex-direction:row; gap:6px; overflow-x:auto}
  .side-menu button{white-space:nowrap; padding:8px 10px}
  .side-menu button .mi{width:24px;height:24px;font-size:14px}
  .side-foot{border:none; margin:0; padding:0}
  .side-foot button{width:auto; padding:8px 10px}
  .main{padding:16px 14px 70px}
}
</style>
</head>
<body>
<div id="updatebar"></div>
<div class="app">
  <aside class="sidebar">
    <div class="side-brand">
      <img src="__LOGO__" alt="logo">
      <div><div class="bt">ทันตสุขภาพ</div><div class="bs">Oral-Health Screening</div></div>
    </div>
    <div class="side-menu" id="sidemenu"></div>
    <div class="side-foot"><button id="themeBtn">🌓 สลับโหมดสี</button></div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <h1>แดชบอร์ดคัดกรองสุขภาพช่องปากนักเรียน</h1>
        <p class="sub">ปีการศึกษา 2569 · <span id="school-name"></span></p>
      </div>
      <span class="nsel" id="nsel"></span>
    </div>

    <div class="filters">
      <div class="filt"><label for="f-round">🔄 รอบที่</label><select id="f-round"></select></div>
      <div class="filt"><label for="f-year">📅 ปี</label><select id="f-year"></select></div>
      <div class="filt"><label for="f-school">🏫 โรงเรียน</label><select id="f-school"></select></div>
      <div class="filt"><label for="f-class">🎓 ชั้นเรียน</label><select id="f-class"></select></div>
      <div class="filt"><label for="f-risk">⚠️ กลุ่มความเสี่ยง</label><select id="f-risk"></select></div>
      <div class="reset"><button id="resetBtn">↺ ล้างตัวกรอง</button></div>
    </div>

    <div class="kpis" id="kpis"></div>
    <div id="sections"></div>
    <footer id="footer"></footer>
  </main>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-head">
      <div><h3 id="m-title">📋 รายชื่อนักเรียน</h3><div class="m-sub" id="m-sub"></div></div>
      <div class="modal-actions">
        <button class="btn-csv" id="m-csv">⬇ ส่งออก CSV</button>
        <button class="btn-x" id="m-close" aria-label="ปิด">✕</button>
      </div>
    </div>
    <div class="modal-body"><table class="rec" id="m-table"></table></div>
    <div class="modal-foot" id="m-foot"></div>
  </div>
</div>
<div class="tip" id="tip"></div>

<script id="payload" type="application/json">__DATA__</script>
<script>
const RAW = JSON.parse(document.getElementById('payload').textContent);
const RECORDS = RAW.records, FIELDS = RAW.fields, CLASS_ORDER = RAW.class_order;
const byCode = Object.fromEntries(FIELDS.map(f=>[f.code,f]));
const css = k => getComputedStyle(document.documentElement).getPropertyValue(k).trim();
const C = ()=>({series:css('--series-1'), good:css('--good'), warn:css('--warning'), serious:css('--serious'), crit:css('--critical')});
const HUES = ['#2563eb','#0ea5a4','#7c3aed','#f59e0b','#ec4899','#16a34a','#06b6d4','#f97316'];
const TEETH = RAW.teeth||[];
const CARIES = new Set(['K','P','1','2']);
const tv = (r,f)=>{const v=r[f]; return v==null?'':String(v).trim();};

// ---- filters ----
const last = arr => arr.length? arr[arr.length-1] : '__all__';
const state = {round:last(RAW.rounds), year:last(RAW.years), school:'__all__', class:'__all__', risk:'__all__'};
function uniq(field, order){
  const s=[...new Set(RECORDS.map(r=>r[field]).filter(v=>v!=null))];
  if(order){ s.sort((a,b)=>{const ia=order.indexOf(a), ib=order.indexOf(b); return (ia<0?99:ia)-(ib<0?99:ib);}); }
  else s.sort();
  return s;
}
function fillSelect(id, values, allLabel, selected){
  const el=document.getElementById(id);
  el.innerHTML = `<option value="__all__">${allLabel}</option>` + values.map(v=>`<option value="${v}"${v===selected?' selected':''}>${v}</option>`).join('');
}
const RISK_ORDER=['เสี่ยงต่ำ','เสี่ยงสูง','เสี่ยงสูงมาก'];
fillSelect('f-round', RAW.rounds, 'ทุกรอบ', state.round);
fillSelect('f-year', RAW.years, 'ทุกปี', state.year);
fillSelect('f-school', uniq('school_name'), 'ทั้งหมด');
fillSelect('f-class', uniq('class_level', CLASS_ORDER), 'ทุกชั้น');
fillSelect('f-risk', uniq('riskgroup', RISK_ORDER), 'ทุกกลุ่ม');
document.getElementById('school-name').textContent = uniq('school_name').join(' / ');

function filtered(){
  return RECORDS.filter(r=>
    (state.round==='__all__'||r.round_id===state.round) &&
    (state.year==='__all__'||r.year===state.year) &&
    (state.school==='__all__'||r.school_name===state.school) &&
    (state.class==='__all__'||r.class_level===state.class) &&
    (state.risk==='__all__'||r.riskgroup===state.risk));
}
['round','year','school','class','risk'].forEach(k=>{
  document.getElementById('f-'+k).addEventListener('change', e=>{ state[k]=e.target.value; render(); });
});
document.getElementById('resetBtn').addEventListener('click', ()=>{
  state.round=last(RAW.rounds); state.year=last(RAW.years); state.school=state.class=state.risk='__all__';
  document.getElementById('f-round').value=state.round; document.getElementById('f-year').value=state.year;
  ['school','class','risk'].forEach(k=>document.getElementById('f-'+k).value='__all__');
  render();
});

const num = v => (typeof v==='number' && !isNaN(v));
function mean(rows, code){const a=rows.map(r=>r[code]).filter(num); return a.length? a.reduce((x,y)=>x+y,0)/a.length : null;}
function counts(rows, code){const m=new Map(); rows.forEach(r=>{const v=r[code]; if(v==null||v==='')return; const k=String(v); m.set(k,(m.get(k)||0)+1);}); return m;}
function nonNull(rows, code){return rows.filter(r=>r[code]!=null && r[code]!=='').length;}

const tip=document.getElementById('tip');
function showTip(html,x,y){tip.innerHTML=html; tip.style.opacity=1; tip.style.left=Math.min(x+14, innerWidth-270)+'px'; tip.style.top=(y+14)+'px';}
function hideTip(){tip.style.opacity=0;}
function el(tag,cls,html){const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e;}

function vbars(items, opts={}){
  const wrap=el('div','vbars'+(items.length>6?' many':''));
  const mode=opts.mode||'pct'; const key=mode==='val'?'val':'pct'; const unit=opts.unit||'คน';
  const max=Math.max(0.0001,...items.map(i=>i[key]||0));
  items.forEach(it=>{
    const col=el('div','vcol');
    const val=el('div','vval');
    if(mode==='val'){ val.appendChild(el('div','vc',it.val.toFixed(2))); }
    else { val.appendChild(el('div','vc',String(it.count))); if(!opts.noPct) val.appendChild(el('div','vp',it.pct.toFixed(0)+'%')); }
    col.appendChild(val);
    const w=el('div','vwrap'); const bar=el('div','vbar');
    bar.style.height=((it[key]||0)/max*100)+'%'; bar.style.background=it.color;
    w.appendChild(bar); col.appendChild(w);
    col.appendChild(el('div','vlab',(it.flag?'<span class="fl">⚠️</span> ':'')+it.label));
    col.addEventListener('mousemove',e=>showTip(`<b>${it.label}</b><br>${mode==='val'?it.val.toFixed(2):it.count+' '+unit+(opts.noPct?'':' ('+it.pct.toFixed(1)+'%)')}<br><span style="opacity:.7">คลิกเพื่อดูรายชื่อ</span>`,e.clientX,e.clientY));
    col.addEventListener('mouseleave',hideTip);
    if(it.rows){ col.addEventListener('click',()=>{ hideTip(); openTable((opts.title?opts.title+' · ':'')+it.label, it.rows, it.focus!=null?it.focus:(opts.focus||[])); }); }
    else col.style.cursor='default';
    wrap.appendChild(col);
  });
  return wrap;
}
function cardShell(title, sub, icon, wide){
  const card=el('div','card'+(wide?' wide':''));
  card.appendChild(el('h3',null,`<span class="htxt">${icon?`<span class="ci">${icon}</span>`:''}${title}</span><button class="card-view" type="button">📋 ดูรายชื่อ</button>`));
  card.appendChild(el('p','h-sub',sub||''));
  card._title=title;
  return card;
}
function wireCardView(card, title, rows, focus){
  const btn=card.querySelector('.card-view');
  if(btn) btn.onclick=()=>openTable(title, rows, focus||[]);
}
function enumCard(code, title, opts={}){
  const f=byCode[code]; const rows=filtered(); const m=counts(rows, code);
  const denom = opts.denomAll ? rows.length : nonNull(rows,code);
  const dec=f.decode||{}; const alert=new Set(f.alert||[]);
  let keys=[...m.keys()];
  if(opts.order){ keys.sort((a,b)=>{const ia=opts.order.indexOf(a),ib=opts.order.indexOf(b); return (ia<0?99:ia)-(ib<0?99:ib);}); }
  else if(f.decode){ const ord=Object.keys(dec); keys.sort((a,b)=>{const ia=ord.indexOf(a),ib=ord.indexOf(b); return (ia<0?99:ia)-(ib<0?99:ib);}); }
  else keys.sort((a,b)=>{const na=parseFloat(a),nb=parseFloat(b); if(!isNaN(na)&&!isNaN(nb))return na-nb; return String(a).localeCompare(String(b));});
  const ttl=title||f.thai||code;
  const items=keys.map((k,i)=>({label:dec[k]||k, count:m.get(k), pct: denom? m.get(k)/denom*100:0,
    flag:alert.has(k), color: alert.has(k)? C().crit : (opts.color||HUES[i%HUES.length]),
    rows: rows.filter(r=>String(r[code])===k), focus:[code]}));
  const card=cardShell(ttl, opts.sub || (`ฐาน ${denom} คนที่มีข้อมูล`+(rows.length-denom>0?` · ไม่ระบุ ${rows.length-denom}`:'')), opts.icon, opts.wide);
  if(!items.length) card.appendChild(el('div','empty','ไม่มีข้อมูลในตัวกรองนี้'));
  else card.appendChild(vbars(items,{title:ttl, focus:[code]}));
  wireCardView(card, ttl, rows, [code]);
  if(opts.note)card.appendChild(el('p','note',opts.note));
  return card;
}
function prevalenceCard(title, sub, specs, opts={}){
  const rows=filtered();
  let items=specs.map((s,i)=>{
    const base = s.denomAll ? rows : rows.filter(r=>r[s.code]!=null&&r[s.code]!=='');
    const denom = base.length; const hitRows=base.filter(r=>s.positive(r[s.code]));
    return {label:s.label, count:hitRows.length, pct: denom? hitRows.length/denom*100:0,
      color:s.color||HUES[i%HUES.length], rows:hitRows, focus:[s.code]};
  });
  if(opts.sort) items.sort((a,b)=>b.pct-a.pct);
  const card=cardShell(title, sub||'', opts.icon, opts.wide);
  card.appendChild(vbars(items,{title}));
  wireCardView(card, title, rows, specs.map(s=>s.code));
  if(opts.note)card.appendChild(el('p','note',opts.note));
  return card;
}
function histCard(code, title, opts={}){
  const rows=filtered(); const a=rows.map(r=>r[code]).filter(num);
  const card=cardShell(title||byCode[code]?.thai||code, '', opts.icon, opts.wide);
  const mv = a.length? (a.reduce((x,y)=>x+y,0)/a.length):0;
  card.querySelector('.h-sub').textContent = a.length? `n=${a.length} · เฉลี่ย ${mv.toFixed(1)} · ต่ำสุด ${Math.min(...a)} · สูงสุด ${Math.max(...a)}` : '';
  if(!a.length){card.appendChild(el('div','empty','ไม่มีข้อมูล')); return card;}
  let lo=opts.min??Math.min(...a), hi=opts.max??Math.max(...a);
  const step=opts.step|| Math.max(1, Math.ceil((hi-lo+1)/10));
  const bins=[]; for(let s=lo; s<=hi; s+=step){bins.push({s,e:s+step-1,c:0});}
  a.forEach(v=>{let idx=Math.floor((v-lo)/step); if(idx<0)idx=0; if(idx>=bins.length)idx=bins.length-1; bins[idx].c++;});
  const ttl=title||byCode[code]?.thai||code;
  const items=bins.map(b=>({label: step===1? String(b.s):`${b.s}-${b.e}`, count:b.c, pct:0, color:HUES[0],
    rows: rows.filter(r=>num(r[code]) && r[code]>=b.s && r[code]<=b.e), focus:[code]}));
  const max=Math.max(1,...items.map(x=>x.count)); items.forEach(x=>x.pct=x.count/max*100);
  card.appendChild(vbars(items,{noPct:true, title:ttl, focus:[code]}));
  wireCardView(card, ttl, rows.filter(r=>num(r[code])), [code]);
  if(opts.note)card.appendChild(el('p','note',opts.note));
  return card;
}
function meanBarsCard(title, sub, items, opts={}){
  const card=cardShell(title, sub||'', opts.icon, opts.wide);
  const rows=opts.rows||[];
  card.appendChild(vbars(items.map(it=>({label:it.label, val:it.val, color:it.color,
    rows: it.code? rows.filter(r=>num(r[it.code])) : rows, focus: it.code?[it.code]:[]})), {mode:'val', title}));
  wireCardView(card, title, rows, items.map(it=>it.code).filter(Boolean));
  if(opts.note)card.appendChild(el('p','note',opts.note));
  return card;
}

// ---- drill-down record table + CSV ----
const VCOLS={ n_caries:{label:'จำนวนซี่ผุ (K/P/1/2)',num:true}, caries_list:{label:'ซี่ที่พบรอยผุ'} };
function fmtField(r,code){ if(VCOLS[code]){const v=r[code]; return (v==null||v==='')?'':String(v);}
  const f=byCode[code]; let v=r[code]; if(v==null||v==='')return '';
  if(f&&f.decode&&f.decode[String(v)])return f.decode[String(v)]; return String(v);}
const BASECOLS=[
  {key:'cid',label:'รหัส',num:true,get:r=>r.cid},
  {key:'name',label:'ชื่อนักเรียน',get:r=>r.name||''},
  {key:'class_level',label:'ชั้น',get:r=>r.class_level||''},
  {key:'sex',label:'เพศ',get:r=>fmtField(r,'sex')},
  {key:'riskgroup',label:'กลุ่มเสี่ยง',get:r=>r.riskgroup||''},
  {key:'dmft',label:'DMFT',num:true,get:r=>r.dmft},
];
function focusCols(focus){
  const seen=new Set(BASECOLS.map(c=>c.key));
  const out=[];
  (focus||[]).forEach(code=>{
    if(!code||seen.has(code))return;
    if(VCOLS[code]){ seen.add(code); out.push({key:code, label:VCOLS[code].label, num:VCOLS[code].num, get:r=>fmtField(r,code)}); return; }
    if(!byCode[code])return; seen.add(code);
    const f=byCode[code]; const isNum=f.kind==='num';
    out.push({key:code, label:(f.thai?String(f.thai):code).slice(0,30), num:isNum, get:r=>fmtField(r,code)});
  });
  return out;
}
function escapeHtml(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function filterSummary(){
  const p=[];
  p.push('รอบ '+(state.round==='__all__'?'ทั้งหมด':state.round));
  p.push('ปี '+(state.year==='__all__'?'ทั้งหมด':state.year));
  if(state.class!=='__all__')p.push('ชั้น '+state.class);
  if(state.risk!=='__all__')p.push(state.risk);
  return p.join(' · ');
}
let modalState={rows:[],cols:[],title:''};
function openTable(title, rows, focus){
  const cols=[...BASECOLS, ...focusCols(focus)];
  modalState={rows, cols, title};
  document.getElementById('m-title').innerHTML='📋 '+escapeHtml(title);
  document.getElementById('m-sub').textContent=`${rows.length} รายการ`;
  const head='<thead><tr>'+cols.map(c=>`<th>${escapeHtml(c.label)}</th>`).join('')+'</tr></thead>';
  const body='<tbody>'+ (rows.length? rows.map(r=>'<tr>'+cols.map(c=>`<td class="${c.num?'numc':''}">${escapeHtml(c.get(r))}</td>`).join('')+'</tr>').join('')
      : `<tr><td colspan="${cols.length}" style="text-align:center;color:var(--muted);padding:22px">ไม่มีรายการ</td></tr>`) +'</tbody>';
  document.getElementById('m-table').innerHTML=head+body;
  document.getElementById('m-foot').textContent='ตัวกรองปัจจุบัน: '+filterSummary();
  document.getElementById('modal').classList.add('open');
}
function closeTable(){document.getElementById('modal').classList.remove('open');}
function exportCSV(){
  const {rows,cols,title}=modalState;
  const esc=v=>{v=(v==null?'':String(v)); return /[",\n\r]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  const lines=[cols.map(c=>esc(c.label)).join(',')];
  rows.forEach(r=>lines.push(cols.map(c=>esc(c.get(r))).join(',')));
  const blob=new Blob(['﻿'+lines.join('\r\n')],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  const safe=(title||'records').replace(/[^฀-๿א-תa-zA-Z0-9]+/g,'_').slice(0,50);
  a.href=url; a.download='นักเรียน_'+safe+'.csv'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
document.getElementById('m-close').addEventListener('click',closeTable);
document.getElementById('m-csv').addEventListener('click',exportCSV);
document.getElementById('modal').addEventListener('click',e=>{ if(e.target.id==='modal') closeTable(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeTable(); });

function renderKPI(){
  const rows=filtered(); const box=document.getElementById('kpis'); box.innerHTML='';
  const n=rows.length;
  const boys=rows.filter(r=>String(r.sex)==='1').length, girls=rows.filter(r=>String(r.sex)==='2').length;
  const ageM=mean(rows,'age_years');
  const dm=r=>(num(r.d)?r.d:0)+(num(r.m)?r.m:0);
  const dmf=r=>dm(r)+(num(r.f)?r.f:0);
  const gt=rows.filter(r=>dm(r)===0).length; const gtp=n?gt/n*100:0;        // ฟันดีไม่มีผุ d+m=0
  const cfree=rows.filter(r=>dmf(r)===0).length; const cfp=n?cfree/n*100:0;  // ปราศจากฟันผุ d+m+f=0
  const dmft=mean(rows,'dmft');
  const ging=rows.filter(r=>num(r.r_ohplaque)&&r.r_ohplaque>0).length; const gingiv=n?ging/n*100:0; // จาก r_ohplaque
  const car=rows.filter(r=>(r.n_caries||0)>=1).length; const carp=n?car/n*100:0;
  const rgLow=rows.filter(r=>r.riskgroup==='เสี่ยงต่ำ').length;
  const rgHigh=rows.filter(r=>r.riskgroup==='เสี่ยงสูง').length;
  const rgVH=rows.filter(r=>r.riskgroup==='เสี่ยงสูงมาก').length;
  const K=[
    {ic:'👥', v:n, l:'นักเรียนที่คัดกรอง', s:`ชาย ${boys} · หญิง ${girls}`, g:'g-blue', rows:rows, focus:['sex']},
    {ic:'🎂', v:ageM!=null?ageM.toFixed(1):'–', l:'อายุเฉลี่ย (ปี)', s:'ช่วง อนุบาล–มัธยม', g:'g-teal', rows:rows, focus:['age_years']},
    {ic:'😁', v:gtp.toFixed(0)+'%', l:'ฟันดีไม่มีผุ (d+m=0)', s:`${gt} คน`, g: gtp>=50?'g-green':(gtp>=35?'g-amber':'g-red'), rows:rows.filter(r=>dm(r)===0), focus:['d','m','f']},
    {ic:'✨', v:cfp.toFixed(0)+'%', l:'ปราศจากฟันผุ (d+m+f=0)', s:`${cfree} คน`, g: cfp>=50?'g-green':(cfp>=35?'g-amber':'g-red'), rows:rows.filter(r=>dmf(r)===0), focus:['d','m','f']},
    {ic:'🦷', v:dmft!=null?dmft.toFixed(1):'–', l:'DMFT เฉลี่ย', s:'ผุ+ถอน+อุด ต่อคน', g: dmft>=3?'g-red':(dmft>=1?'g-amber':'g-green'), rows:rows, focus:['d','m','f']},
    {ic:'🩸', v:gingiv.toFixed(0)+'%', l:'เหงือกอักเสบ', s:'จากเกณฑ์เสี่ยง r_ohplaque', g: gingiv>=50?'g-red':'g-amber', rows:rows.filter(r=>num(r.r_ohplaque)&&r.r_ohplaque>0), focus:['r_ohplaque']},
    {ic:'🦷', v:carp.toFixed(0)+'%', l:'มีฟันแท้ผุ (K/P/1/2)', s:`${car} คน`, g: carp>=40?'g-red':(carp>=20?'g-amber':'g-green'), rows:rows.filter(r=>(r.n_caries||0)>=1), focus:['n_caries','caries_list']},
  ];
  K.forEach(k=>{ const c=el('div','kpi '+k.g);
    c.appendChild(el('div','k-ic',k.ic)); c.appendChild(el('div','k-val',String(k.v)));
    c.appendChild(el('div','k-lab',k.l)); if(k.s)c.appendChild(el('div','k-sub',k.s));
    c.style.cursor='pointer'; c.title='คลิกเพื่อดูรายชื่อ';
    c.onclick=()=>openTable(k.l, k.rows, k.focus||[]); box.appendChild(c); });
  // composite risk-group tile (3 groups, green/amber/red) — placed last
  const pc=x=>n?(x/n*100):0;
  const GRP=[['เสี่ยงต่ำ',rgLow,'#16a34a'],['เสี่ยงสูง',rgHigh,'#f59e0b'],['เสี่ยงสูงมาก',rgVH,'#e11d48']];
  const rc=el('div','kpi kpi-risk');
  rc.appendChild(el('div','k-ic','🚦'));
  rc.appendChild(el('div','rk-t','ร้อยละกลุ่มความเสี่ยงฟันผุ'));
  const bar=el('div','riskbar');
  GRP.forEach(([lab,c,col])=>{ if(c>0){const seg=el('div','seg'); seg.style.width=pc(c)+'%'; seg.style.background=col; bar.appendChild(seg);} });

  rc.appendChild(lg);
  rc.style.cursor='pointer'; rc.title='คลิกเพื่อดูรายชื่อ';

const TSTAT=[['K','ผุระยะเริ่มแรก (K)','#f59e0b'],['P','เคลือบฟันถูกทำลาย (P)','#f97316'],['1','ผุเป็นรู (1)','#e11d48'],['2','อุดแล้วผุซ้ำ (2)','#a21caf']];
function toothCards(){
  const rows=filtered(); const cards=[];
  // A: teeth counts by caries level (unit ซี่)
  const tot={K:0,P:0,'1':0,'2':0};
  rows.forEach(r=>TEETH.forEach(f=>{const v=tv(r,f); if(tot[v]!=null)tot[v]++;}));
  {
    const items=TSTAT.map(([k,lab,col])=>({label:lab,count:tot[k],pct:0,color:col,
      rows:rows.filter(r=>TEETH.some(f=>tv(r,f)===k)), focus:['n_caries','caries_list']}));
    const mx=Math.max(1,...items.map(i=>i.count)); items.forEach(i=>i.pct=i.count/mx*100);
    const c=cardShell('จำนวนซี่ฟันแท้ที่พบรอยผุ แยกระดับ','นับรวมทุกซี่ (หน่วย: ซี่) · คลิกดูรายชื่อนักเรียนที่มีสถานะนั้น','🦷');
    c.appendChild(vbars(items,{title:'ฟันสถานะ',noPct:true,unit:'ซี่'}));
    wireCardView(c,'ฟันแท้ที่พบรอยผุ (K/P/1/2)',rows.filter(r=>(r.n_caries||0)>=1),['n_caries','caries_list']);
    c.appendChild(el('p','note','K=ระยะเริ่มแรก · P=เคลือบฟันถูกทำลาย/เงาเนื้อฟัน · 1=ผุเป็นรูถึงเนื้อฟัน · 2=อุดแล้วมีผุซ้ำ (ตาม tooth.xlsx)'));
    cards.push(c);
  }
  // B: prevalence of students by status (+ overall)
  {
    const items=TSTAT.map(([k,lab,col])=>{const rr=rows.filter(r=>TEETH.some(f=>tv(r,f)===k));
      return {label:'มี '+lab.replace(/ \(.*/,'')+' ≥1 ซี่',count:rr.length,pct:rows.length?rr.length/rows.length*100:0,color:col,rows:rr,focus:['n_caries','caries_list']};});
    const anyr=rows.filter(r=>(r.n_caries||0)>=1);
    items.unshift({label:'มีรอยผุ K/P/1/2 (รวม)',count:anyr.length,pct:rows.length?anyr.length/rows.length*100:0,color:'#dc2626',rows:anyr,focus:['n_caries','caries_list']});
    const c=cardShell('สัดส่วนนักเรียนที่พบฟันแท้แต่ละสถานะ','ร้อยละของนักเรียนในกลุ่มที่เลือก','📊',true);
    c.appendChild(vbars(items,{title:'สภาวะฟัน'}));
    wireCardView(c,'นักเรียนที่มีฟันแท้ผุ (K/P/1/2)',anyr,['n_caries','caries_list']);
    cards.push(c);
  }
  // C: histogram of caries teeth per student
  {
    const a=rows.map(r=>r.n_caries||0); const maxv=Math.max(0,...a);
    const items=[]; for(let s=0;s<=maxv;s++){const rr=rows.filter(r=>(r.n_caries||0)===s);
      items.push({label:String(s),count:rr.length,pct:0,color:s===0?'#16a34a':'#e11d48',rows:rr,focus:['n_caries','caries_list']});}
    const mx=Math.max(1,...items.map(i=>i.count)); items.forEach(i=>i.pct=i.count/mx*100);
    const c=cardShell('จำนวนซี่ฟันผุ (K/P/1/2) ต่อคน', `เฉลี่ย ${(a.reduce((x,y)=>x+y,0)/(a.length||1)).toFixed(2)} ซี่/คน · สูงสุด ${maxv} ซี่`, '🔢');
    c.appendChild(vbars(items,{title:'จำนวนซี่ผุต่อคน',noPct:true,unit:'คน'}));
    wireCardView(c,'จำนวนซี่ฟันผุต่อคน',rows,['n_caries','caries_list']);
    cards.push(c);
  }
  // D: tooth positions most affected
  {
    const pos=TEETH.map(f=>{const rr=rows.filter(r=>CARIES.has(tv(r,f))); return {label:'ซี่ '+f.slice(1),count:rr.length,rows:rr};})
      .filter(x=>x.count>0).sort((a,b)=>b.count-a.count);
    const items=pos.map(x=>({label:x.label,count:x.count,pct:0,color:'#e11d48',rows:x.rows,focus:['n_caries','caries_list']}));
    const mx=Math.max(1,...items.map(i=>i.count)); items.forEach(i=>i.pct=i.count/mx*100);
    const c=cardShell('ตำแหน่งฟันแท้ที่พบรอยผุบ่อยที่สุด','จำนวนนักเรียนที่ฟันซี่นั้นมีสถานะ K/P/1/2 (เลขซี่ FDI)','🦷',true);
    if(!items.length)c.appendChild(el('div','empty','ไม่พบรอยผุในกลุ่มที่เลือก'));
    else c.appendChild(vbars(items,{title:'ตำแหน่งฟันที่พบรอยผุ',noPct:true,unit:'คน'}));
    wireCardView(c,'นักเรียนที่พบรอยผุ',rows.filter(r=>(r.n_caries||0)>=1),['n_caries','caries_list']);
    cards.push(c);
  }
  return cards;

function riskGroupCard(){
  const rows=filtered(); const m=counts(rows,'riskgroup'); const n=rows.length;
  const order=[['เสี่ยงต่ำ',C().good],['เสี่ยงสูง',C().serious],['เสี่ยงสูงมาก',C().crit]];
  const items=order.filter(([k])=>m.get(k)).map(([k,col])=>({label:k,count:m.get(k),pct:n?m.get(k)/n*100:0,color:col,
    rows:rows.filter(r=>r.riskgroup===k), focus:['riskgroup']}));
  const card=cardShell('การจัดกลุ่มความเสี่ยงฟันผุ',`ฐาน ${n} คน`,'🚦',true);
  card.appendChild(vbars(items,{title:'กลุ่มความเสี่ยง'}));
  wireCardView(card,'การจัดกลุ่มความเสี่ยงฟันผุ',rows,['riskgroup']);
  const lg=el('div','legend');
  order.forEach(([k,col])=>{const s=el('span'); const i=el('i'); i.style.background=col; s.appendChild(i); s.appendChild(document.createTextNode(k)); lg.appendChild(s);});
  card.appendChild(lg); return card;
}

// ---- Insights อัตโนมัติต่อหน้า ----
function pctOf(a,b){return b?Math.round(a/b*100):0;}
function topOf(rows, code, decode){
  const m=counts(rows, code); let best=null, bc=-1;
  m.forEach((v,k)=>{ if(v>bc){bc=v; best=k;} });
  if(best==null) return null;
  return {key:best, label:(decode&&decode[best])||best, count:bc, pct:pctOf(bc, rows.length)};
}
function countIn(rows, code, vals){ const s=new Set(vals.map(String)); return rows.filter(r=>s.has(String(r[code]))).length; }

function sectionInsights(id, rows){
  const n=rows.length; if(!n) return [];
  const out=[]; const push=(s,t)=>out.push({s,t});
  const dec=c=>(byCode[c]&&byCode[c].decode)||{};
  if(id==='s1'){
    const b=countIn(rows,'sex',['1']), g=countIn(rows,'sex',['2']);
    push('info', `คัดกรองทั้งหมด <b>${n}</b> คน — ชาย <b>${b}</b> (${pctOf(b,n)}%) หญิง <b>${g}</b> (${pctOf(g,n)}%)`);
    const nn=nonNull(rows,'nutrition_status'); const bad=countIn(rows,'nutrition_status',['2','3']);
    if(nn) push(pctOf(bad,nn)>=30?'warn':'good', `ภาวะโภชนาการไม่ปกติ <b>${pctOf(bad,nn)}%</b> (ท้วม/อ้วน ${pctOf(countIn(rows,'nutrition_status',['2']),nn)}% · ผอม ${pctOf(countIn(rows,'nutrition_status',['3']),nn)}%)`);
    const cl=topOf(rows,'class_level'); if(cl) push('info', `ชั้นที่มีนักเรียนมากสุดคือ <b>${cl.label}</b> (${cl.count} คน)`);
    const sib=nonNull(rows,'siblings_caries'); if(sib){ const y=countIn(rows,'siblings_caries',['1']); if(y) push('warn', `พบประวัติพี่/น้องมีฟันผุ <b>${pctOf(y,sib)}%</b> ของผู้ที่ให้ข้อมูล (ปัจจัยเสี่ยงในครอบครัว)`); }
  }
  else if(id==='s2'){
    const bed=pctOf(countIn(rows,'brush_before_bed',['2']),n);
    push(bed>=70?'good':'warn', `แปรงฟันก่อนนอน "ทุกวัน" เพียง <b>${bed}%</b> ${bed<70?'— เป็นช่วงที่ควรกระตุ้นมากที่สุด':''}`);
    const flu=nonNull(rows,'toothpaste_f'); if(flu) push('good', `ใช้ยาสีฟันผสมฟลูออไรด์ <b>${pctOf(countIn(rows,'toothpaste_f',['1']),flu)}%</b>`);
    const sw=nonNull(rows,'sweet_drink_freq'), sn=nonNull(rows,'snack_freq');
    const swr=pctOf(countIn(rows,'sweet_drink_freq',['2','3']),sw), snr=pctOf(countIn(rows,'snack_freq',['2','3']),sn);
    push(Math.max(swr,snr)>=30?'crit':'warn', `บริโภคหวานถี่ (≥3-4 ครั้ง/วัน): เครื่องดื่มหวาน <b>${swr}%</b> · ขนมกรุบกรอบ <b>${snr}%</b>`);
    const dur=pctOf(countIn(rows,'brush_duration',['1']),nonNull(rows,'brush_duration'));
    if(dur) push(dur>=40?'warn':'info', `แปรงฟันสั้นกว่า 2 นาที <b>${dur}%</b>`);
  }
  else if(id==='s5'){
    const specs=[['food_impaction','เศษอาหารติดฟัน'],['bleeding_brush','เลือดออกขณะแปรง'],['bad_breath','กลิ่นปาก'],['dentine_sensitivity','เสียวฟัน'],['gingival_abscess','เหงือกบวมหนอง']];
    const scored=specs.map(([c,l])=>({l, p:pctOf(countIn(rows,c,['1','2']),n), c})).sort((a,b)=>b.p-a.p);
    push('warn', `อาการที่พบบ่อยสุดคือ <b>${scored[0].l}</b> (${scored[0].p}%)`);
    const bl=scored.find(x=>x.c==='bleeding_brush');
    push(bl.p>=40?'crit':'warn', `เลือดออกขณะแปรงฟัน <b>${bl.p}%</b> — เป็นสัญญาณของภาวะเหงือกอักเสบ`);
  }
  else if(id==='s4'){
    const tr=nonNull(rows,'dental_treat_12m'); if(tr) push('info', `เคยทำฟันใน 12 เดือน <b>${pctOf(countIn(rows,'dental_treat_12m',['1']),tr)}%</b>`);
    const nc=pctOf(countIn(rows,'dental_check_12m',['0']),n);
    push(nc>=20?'warn':'good', `ไม่เคยได้รับการตรวจฟันใน 12 เดือน <b>${nc}%</b>`);
    const edu=[['edu_teacher','ครู'],['edu_parents','พ่อแม่/ญาติ'],['edu_health_staff','จนท.สธ.'],['edu_online','สื่อออนไลน์']]
      .map(([c,l])=>({l,p:pctOf(countIn(rows,c,['1']),n)})).sort((a,b)=>b.p-a.p)[0];
    push('info', `ช่องทางรับความรู้สุขภาพช่องปากหลักคือ <b>${edu.l}</b> (${edu.p}%)`);
  }
  else if(id==='sum'){
    const dm=r=>(num(r.d)?r.d:0)+(num(r.m)?r.m:0), dmf=r=>dm(r)+(num(r.f)?r.f:0);
    push('info', `DMFT เฉลี่ย <b>${(mean(rows,'dmft')||0).toFixed(2)}</b> ซี่/คน (ฟันผุ D เฉลี่ย ${(mean(rows,'d')||0).toFixed(2)})`);
    const gt=pctOf(rows.filter(r=>dm(r)===0).length,n), cf=pctOf(rows.filter(r=>dmf(r)===0).length,n);
    push(gt>=50?'good':'warn', `ฟันดีไม่มีผุ (d+m=0) <b>${gt}%</b> · ปราศจากฟันผุ (d+m+f=0) <b>${cf}%</b>`);
    const gi=pctOf(rows.filter(r=>num(r.r_ohplaque)&&r.r_ohplaque>0).length,n);
    push(gi>=50?'crit':'warn', `พบภาวะเหงือกอักเสบ <b>${gi}%</b> (จากเกณฑ์ r_ohplaque)`);
  }
  else if(id==='tooth'){
    const car=rows.filter(r=>(r.n_caries||0)>=1).length;
    push(pctOf(car,n)>=30?'crit':'warn', `พบฟันแท้มีรอยผุ (K/P/1/2) อย่างน้อย 1 ซี่ <b>${pctOf(car,n)}%</b> (${car} คน) เฉลี่ย ${(rows.reduce((a,r)=>a+(r.n_caries||0),0)/n).toFixed(2)} ซี่/คน`);
    const tot={K:0,P:0,'1':0,'2':0}; rows.forEach(r=>TEETH.forEach(f=>{const v=tv(r,f); if(tot[v]!=null)tot[v]++;}));
    const lab={K:'ผุระยะเริ่มแรก (K)',P:'เคลือบฟันถูกทำลาย (P)','1':'ผุเป็นรู (1)','2':'อุดแล้วผุซ้ำ (2)'};
    const topStat=Object.entries(tot).sort((a,b)=>b[1]-a[1])[0];
    if(topStat[1]>0) push('warn', `ระดับรอยผุที่พบมากสุดคือ <b>${lab[topStat[0]]}</b> รวม ${topStat[1]} ซี่`);
    const pos=TEETH.map(f=>({f,c:rows.filter(r=>CARIES.has(tv(r,f))).length})).filter(x=>x.c>0).sort((a,b)=>b.c-a.c)[0];
    if(pos) push('info', `ตำแหน่งที่พบรอยผุบ่อยสุดคือ <b>ซี่ ${pos.f.slice(1)}</b> (${pos.c} คน) — มักเป็นฟันกรามแท้ซี่แรก`);
  }
  else if(id==='risk'){
    const facs=[['r_caries','ประวัติ/ฟันเสี่ยงผุ'],['r_ohplaque','เหงือกอักเสบ'],['r_sweet','บริโภคหวาน'],['r_brushflu','ขาดแปรง+ฟลูออไรด์'],['r_siblings','พี่/น้องฟันผุ'],['r_flu','Fluorosis'],['r_app','เครื่องมือในช่องปาก'],['r_defect','ความบกพร่อง']]
      .map(([c,l])=>({l,p:pctOf(rows.filter(r=>num(r[c])&&r[c]>0).length,n)})).sort((a,b)=>b.p-a.p);
    push('crit', `ปัจจัยเสี่ยงที่พบมากสุดคือ <b>${facs[0].l}</b> (${facs[0].p}%) รองลงมา ${facs[1].l} (${facs[1].p}%)`);
    const avg=(rows.reduce((a,r)=>a+['r_defect','r_caries','r_flu','r_brushflu','r_app','r_sweet','r_siblings'].filter(c=>num(r[c])&&r[c]>0).length + (num(r.r_ohplaque)&&r.r_ohplaque>0?1:0),0)/n);
    push('info', `นักเรียนติดเกณฑ์เสี่ยงเฉลี่ย <b>${avg.toFixed(1)}</b> ปัจจัย/คน`);
  }
  else if(id==='res'){
    const vh=pctOf(countIn(rows,'riskgroup',['เสี่ยงสูงมาก']),n), hi=pctOf(countIn(rows,'riskgroup',['เสี่ยงสูง']),n), lo=pctOf(countIn(rows,'riskgroup',['เสี่ยงต่ำ']),n);
    push(vh>=50?'crit':'warn', `กลุ่มเสี่ยงสูงมาก <b>${vh}%</b> · เสี่ยงสูง ${hi}% · เสี่ยงต่ำ ${lo}%`);
    push('info', `คะแนนความเสี่ยงเฉลี่ย <b>${(mean(rows,'riskscore')||0).toFixed(1)}</b> คะแนน (คะแนนสูง = เสี่ยงมาก)`);
    if(vh>=70) push('crit', `สัดส่วนกลุ่มเสี่ยงสูงมากค่อนข้างสูง ควรวางแผนป้องกัน/ส่งต่อเชิงรุก`);
  }
  return out;
}
function renderInsights(id){
  const rows=filtered(); const items=sectionInsights(id, rows);
  if(!items.length) return null;
  const box=el('div','insights');
  box.appendChild(el('h4',null,'💡 ข้อค้นพบสำคัญ (Insights)'));
  const ul=el('ul');
  const DOT={crit:'🔴',warn:'🟠',good:'🟢',info:'🔵'};
  items.forEach(it=>{ const li=el('li'); li.innerHTML=`<span class="d">${DOT[it.s]||'🔵'}</span><span>${it.t}</span>`; ul.appendChild(li); });
  box.appendChild(ul); return box;
}

let activeSec='s1';
function renderMenu(){
  const menu=document.getElementById('sidemenu'); menu.innerHTML='';
  SECTIONS.forEach(s=>{
    const b=el('button',s.id===activeSec?'active':null,`<span class="mi" style="background:linear-gradient(135deg,${s.color},${s.color}bb)">${s.icon}</span> ${s.title}`);
    b.dataset.sec=s.id;
    b.addEventListener('click',()=>{activeSec=s.id; setActiveMenu();
      document.getElementById('sec-'+s.id)?.scrollIntoView({behavior:'smooth',block:'start'});});
    menu.appendChild(b);
  });
}
function setActiveMenu(){[...document.querySelectorAll('#sidemenu button')].forEach(b=>b.classList.toggle('active',b.dataset.sec===activeSec));}
function renderSections(){
  const host=document.getElementById('sections'); host.innerHTML='';
  SECTIONS.forEach(s=>{
    const sec=el('section','cat'); sec.id='sec-'+s.id;
    const h=el('div','cat-h');
    const badge=el('div','cat-badge',s.icon); badge.style.background=`linear-gradient(135deg,${s.color},${s.color}bb)`;
    h.appendChild(badge);
    const tw=el('div'); tw.appendChild(el('h2',null,s.title));
    const nf=s.count || (FIELDS.filter(f=>f.cat===s.cat).length+' ฟิลด์ในหมวด');
    tw.appendChild(el('span','cat-n',`${s.name} · ${nf}`));
    h.appendChild(tw); sec.appendChild(h);
    sec.appendChild(el('p','cat-desc',s.desc));
    const ins=renderInsights(s.id); if(ins) sec.appendChild(ins);
    const grid=el('div','grid'); s.build().forEach(c=>grid.appendChild(c)); sec.appendChild(grid);
    host.appendChild(sec);
  });
  observeSections();
}
let io=null;
function observeSections(){
  if(io) io.disconnect();
  io=new IntersectionObserver((ents)=>{
    ents.forEach(e=>{ if(e.isIntersecting){ activeSec=e.target.id.replace('sec-',''); setActiveMenu(); } });
  },{rootMargin:'-15% 0px -75% 0px', threshold:0});
  SECTIONS.forEach(s=>{const n=document.getElementById('sec-'+s.id); if(n)io.observe(n);});
}
function renderMeta(){document.getElementById('nsel').textContent = `👥 ${filtered().length} / ${RECORDS.length} คน`;}
function render(){ renderMeta(); renderKPI(); renderSections(); }

document.getElementById('themeBtn').addEventListener('click',()=>{
  const cur=document.documentElement.getAttribute('data-theme');
  document.documentElement.setAttribute('data-theme', cur==='dark'?'light':'dark'); render();
});
document.documentElement.setAttribute('data-theme',
  (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light');

document.getElementById('footer').innerHTML =
  `📄 ข้อมูล: การคัดกรองสุขภาพช่องปากนักเรียน (datasample.xlsx, ${RECORDS.length} ระเบียน) · ` +
  `ข้อมูลรายซี่ใช้วิเคราะห์รอยผุฟันแท้ (สถานะ K/P/1/2) · เหงือกอักเสบวิเคราะห์จาก r_ohplaque · ` +
  `คำอธิบายค่าจาก option_remark · ทุกกราฟคำนวณสดตามตัวกรองที่เลือก`;

// update banner (populated by the exe app via RAW.app)
if(RAW.app){
  const foot=document.getElementById('footer');
  if(foot) foot.innerHTML += ` · เวอร์ชันแอป ${RAW.app.version}`;
  if(RAW.app.update && RAW.app.update.latest){
    const u=RAW.app.update, bar=document.getElementById('updatebar');
    bar.style.display='block';
    bar.innerHTML=`⬆️ มีเวอร์ชันใหม่ <b>${u.latest}</b> (คุณกำลังใช้ ${RAW.app.version}) — `+
      `<a href="${u.url}" target="_blank" rel="noopener">ดาวน์โหลดจาก GitHub</a><span class="x" onclick="this.parentElement.style.display='none'">✕</span>`;
  }
}

renderMenu(); render();
